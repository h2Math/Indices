<!DOCTYPE html>
<html>
<body>
    <h1>Button Test</h1>
    <button onclick="testFunction()">Click Me First</button>
    <p id="result">Waiting...</p>

    <script>
        function testFunction() {
            document.getElementById('result').innerHTML = '✅ BUTTON IS WORKING! The onclick event fired.';
            document.getElementById('result').style.color = 'green';
            document.getElementById('result').style.fontSize = '20px';
        }
    </script>
</body>
</html>
